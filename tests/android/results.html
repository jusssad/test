<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Результаты</title>
<link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<div class="container">
<div class="top-actions">
<button onclick="location.href='history.html'">История</button>
<button class="secondary" onclick="location.href='../../index.html'">В меню</button>
</div>
<h2 id="score"></h2>
<div id="out"></div>
</div>
<script src="../../js/storage.js"></script>
<script src="questions.js"></script>
<script>
const id=new URLSearchParams(location.search).get("id");
const a=getAttempt("java",id);
document.getElementById("score").textContent=`Результат: ${a.score} из ${a.total}`;
const out=document.getElementById("out");
QUESTIONS.forEach((q,i)=>{
 const d=a.detailed[q.id];
 let status=d.skipped?'Без ответа':(d.correct?'Верно':'Неверно');
 out.innerHTML+=`
 <div class="card">
 <b>${i+1}. ${q.question[0]}</b><br>
 ${status}<br>
 <small>Правильный ответ: ${q.options[q.correct]}</small>
 </div>`;
});
</script>
</body>
</html>
