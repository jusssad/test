<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>История</title>
<link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<div class="container">
<div class="top-actions">
<button onclick="location.href='../../index.html'">В меню</button>
</div>
<h2>История попыток</h2>
<div id="list"></div>
</div>
<script src="../../js/storage.js"></script>
<script>
const list=document.getElementById("list");
loadAttempts("java").forEach(a=>{
 const d=new Date(a.date).toLocaleString();
 list.innerHTML+=`
 <div class="card">
 <b>${d}</b><br>
 ${a.score}/${a.total}<br>
 <button onclick="location.href='results.html?id=${a.id}'">Разбор</button>
 </div>`;
});
</script>
</body>
</html>
